name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package (test extras only)
        run: |
          python -m pip install --upgrade pip
          pip install pydantic pytest
      - name: Run tests
        # The core logic (models, scanner, roles, graph, recommendations,
        # manifest) runs without the heavy audio/UI stack.
        run: pytest -q
